name: Android

on: [push, pull_request]

jobs:
  Android:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - name: Accept Android SDK licenses
      run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null
    - name: Configure local properties
      run: |
        cd projects/android-project
        {
          echo "sdk.dir=$ANDROID_SDK_ROOT"
        } > local.properties
    - name: Build
      run: |
        cd projects/android-project
        ./gradlew assembleEcodeRelease -Pandroid.injected.ndk.abiFilters=arm64-v8a
