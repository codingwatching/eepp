    }

    .caches ul {

        padding: 0;
        z-index: 1
    }

    .caches li {
        border-bottom: 1px solid var(--color-box-border)
    }

    .caches li:last-child {
        border-bottom: 0
    }

    .caches a {
        text-decoration: none;
        display: block;
        padding: 3px 7px
    }

    .caches a:hover {
        text-decoration: underline
    }
</style>
