<!doctype html>
<html lang="en-us">
  <head>
    <style>
      body {
        max-width: 800px;
        margin: auto;
        padding: 0.2em;
        line-height: 1.5em;
      }

      .pull-left {
        float: left;
      }
      .pull-right {
        float: right;
      }

      a {
        color: #613dc1;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      header {
        position: relative;
        width: 100%;
        height: 1.75rem;
        font-size: 0.875rem;
        background: #613dc1;
        border-bottom: 1px solid #000;
      }

      header ul,
      header ol {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      header nav {
        padding: 0 0.5rem;
      }

      header a {
        color: #fff;
        line-height: 1.75rem;
        padding: 0 0.5rem;
      }
      header a:hover,
      header .current a {
        color: #fff;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li class="pull-left">
            <a href="https://spader.zone/" data-prefetched="true">home</a>
          </li>
          <li class="pull-left">
            <a
              href="https://buttondown.com/spader"
              target="_blank"
              rel="noopener"
              >subscribe</a
            >
          </li>
          <li class="pull-left">
            <a href="https://spader.zone/index.xml" data-prefetched="true"
              >rss</a
            >
          </li>
        </ul>
      </nav>
    </header>
  </body>
</html>
