<!DOCTYPE html>
<html lang=en>
<style>
    :root {
        --font-size-default: 1rem;
        --font-size-tags: 0.66rem;
        --base-shadow: 0 0 0;
        --comment-controls-height: 1.2lh;
        --input-outline-width: 2px
    }

    html {
        font-size: var(--font-size-default);
        overflow-y: scroll;
    }

    body {
        font-family: "helvetica neue", arial, sans-serif;
        color: var(--color-fg);
        line-height: 1.45em
    }

    body {
        background-color: var(--color-bg);
        margin: 0 auto;
        padding-bottom: 2em
    }

    a {
        color: var(--color-fg-link);
        cursor: pointer
    }

    li.story div.details span.link a:visited {
        color: var(--color-fg-link-visited)
    }

    a.tag {
        background-color: var(--color-tag-bg);
        border: 1px solid var(--color-tag-border);
        border-radius: 5px;
        color: var(--color-fg-contrast-10);
        font-size: var(--font-size-tags);
        margin-left: 0.25em;
        padding: 0px 0.4em 1px 0.4em;
        text-decoration: none;
        white-space: nowrap
    }

    a.tag_is_media {
        background-color: var(--color-tag-media-bg);
        border-color: var(--color-tag-media-border);
        color: var(--color-fg-contrast-10)
    }

    input:focus,
    button:focus,
    select:focus,
    textarea:focus {
        outline: var(--input-outline-width) solid var(--color-box-border-focus);
        border-color: transparent;
        color: var(--color-fg)
    }

    textarea::placeholder {
        color: var(--color-fg-contrast-7-5)
    }

    input[type="submit"]:focus,
    button:focus {
        border-color: var(--color-box-border-focus);
        outline: 1px solid var(--color-box-border-focus)
    }

    button:hover,
    input[type="button"]:hover,
    input[type="reset"]:hover,
    input[type="submit"]:hover {
        color: var(--color-fg-contrast-10);
        text-decoration: none;
        background-color: var(--color-button-bg-shaded)
    }

    select::-moz-focus-inner {
        border: 0;
        outline: 0
    }

    input:disabled,
    textarea:disabled,
    button:disabled {
        background-color: var(--color-box-bg-shaded);
        color: var(--color-fg-contrast-5)
    }

    summary {
        cursor: pointer
    }

    input.btn-link:hover {
        border: 0;
        margin: 0;
        padding: 0;
        background-color: inherit;
        color: var(--color-fg-contrast-4-5);
        line-height: 1
    }

    input.btn-link:focus-visible {
        outline: auto
    }

    header {
        font-weight: bold;
        line-height: 18px
    }

    ol.stories {
        padding: 0;
        list-style: none;
        margin: 0
    }

    div.voters {
        float: left;
        margin-top: 0px;
        text-align: center;
        width: 40px
    }

    .upvoter:before {
        content: "△";
        font-size: 1.2rem;
        font-family: system-ui, monospace, sans-serif
    }

    .upvoter:hover:before,
    .upvoted .upvoter:before {
        content: "▲";
        color: var(--color-fg-accent);
        -webkit-text-stroke: 1px var(--color-fg-accent)
    }

    .upvoter {
        color: var(--color-fg-contrast-4-5);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-self: center;
        text-decoration: none
    }

    .upvoter:focus {
        outline: none
    }

    .upvoter:focus-visible {
        outline: 2px solid var(--color-fg-link)
    }

    li.story {
        clear: both
    }

    ol.stories li.story div.story_liner {
        padding-top: 0.25em;
        padding-bottom: 0.25em;
        word-break: break-word
    }

    ol.stories li:first-child div.story_liner {
        padding-top: 0.5em
    }

    li div.details {
        padding-top: 0.1em
    }

    .comment:target,
    li:target,
    p:target,
    div:target,
    span:target {
        background-color: var(--color-bg-target);
        border-radius: 8px
    }

    li .link {
        font-weight: bold;
        vertical-align: middle
    }

    li .link a {
        text-decoration: none
    }

    li.story .description_present {
        color: var(--color-fg-contrast-5);
        padding-left: 0.25em;
        text-decoration: none;
        vertical-align: middle
    }

    li.story a.tag {
        vertical-align: middle
    }

    li .tags {
        margin-right: 0.25em
    }

    li .domain {
        color: var(--color-fg-contrast-4-5);
        font-style: italic;
        text-decoration: none;
        vertical-align: middle
    }

    li .comment_folder:before {
        content: "[−]"
    }

    li .comment_folder_button:checked~.comment .comment_folder:before {
        content: "[+]"
    }

    li .comment_folder_button:checked~div.comment:not(:target) div.comment_text {
        display: none
    }

    li .comment_folder_button:checked~div.comment:not(:target) div.voters .upvoter {
        visibility: hidden;
        margin-bottom: -15px
    }

    li .comment_folder_button:checked~ol.comments ol,
    li .comment_folder_button:checked~ol.comments div.comment,
    li .comment_folder_button:checked~ol.comments li {
        display: none
    }

    :not(li.comments_subtree) li.comments_subtree li.comments_subtree li.comments_subtree:has(+li.comments_subtree)::before {
        content: "";
        position: absolute;
        top: 3.6lh;
        left: calc(1em - 1px);
        bottom: 0;
        border-left: 2px dotted var(--color-fg-shape)
    }

    li .byline {
        color: var(--color-fg-contrast-4-5)
    }

    img.avatar {
        border-radius: 8px;
        height: 16px;
        margin-bottom: 2px;
        margin-right: 2px;
        vertical-align: middle;
        width: 16px
    }

    li.story .byline {
        margin-top: 1px
    }

    .byline a {
        color: var(--color-fg-contrast-4-5);
        text-decoration: none
    }

    a.user_is_author,
    li .byline a.user_is_author {
        color: var(--color-fg-author)
    }

    li div.details {
        margin-left: 32px
    }

    nav.morelink {
        float: left
    }

    nav.morelink {
        margin-top: 1.5em
    }

    nav.morelink a {
        color: var(--color-fg-contrast-7-5);
        font-weight: bold;
        text-decoration: none
    }

    nav.morelink a[rel="prev"]::before {
        content: "<< " /""
    }

    nav.morelink a[rel="next"]::after {
        content: " >>" /""
    }

    #flag_dropdown a:hover {
        background-color: var(--color-box-bg-shaded)
    }

    .caches {
        display: inline-block;
        position: relative
    }

    .caches summary {
        list-style: none
    }

    .caches ul {
        position: absolute;
        background: var(--color-bg);
        border: 1px solid var(--color-box-border);
        white-space: nowrap;
        list-style: none;
        padding: 0;
        z-index: 1
    }

    .caches li {
        border-bottom: 1px solid var(--color-box-border)
    }

    .caches li:last-child {
        border-bottom: 0
    }

    .caches a {
        color: var(--color-fg-contrast-7-5);
        text-decoration: none;
        display: block;
        padding: 3px 7px
    }

    .caches a:hover {
        text-decoration: underline
    }

    .tree:before,
    .tree ul:before {
        border-left: 1px solid var(--color-fg-shape);
        bottom: 0;
        content: "";
        display: block;
        left: 0;
        position: absolute;
        top: 0;
        width: 0
    }

    .tree li:before {
        border-top: 1px solid var(--color-fg-shape);
        content: "";
        display: block;
        height: 0;
        left: 0;
        margin-top: -1px;
        position: absolute;
        top: 0.8em;
        width: 8px
    }

    .tree li:last-child:before {
        background-color: var(--color-bg);
        border-left: 0;
        bottom: 0;
        height: auto
    }

    li.noparent:before,
    ul.noparent:before {
        border-top: 0 !important;
        border-left: 0 !important
    }

    label:has(+*:required)::after,
    label:has(+*:not(label) *:required)::after,
    label:has(+*[type="hidden"]+*:required)::after {
        content: "*";
        margin-left: 0.15em;
        vertical-align: middle
    }

    .profile label::after {
        content: ":"
    }

    #story_holder .ts-control:focus-within {
        border-color: var(--color-box-border-focus)
    }

    #story_holder .ts-control .data-ts-item a::after {
        content: "✕";
        display: block;
        position: absolute;
        color: grey;
        outline: none;
        padding-right: 3px;
        top: 0px;
        width: 12px;
        cursor: pointer;
        visibility: visible
    }
</style>
