<!doctype html>
<html lang="en">
  <head>
    <style>
      /* Centered cards */

      .center-card {
        display: flex;
        flex-direction: column;
        align-content: center;
        align-items: center;
        margin: 0px auto;
        padding: 30px 0px 70px 0px;
        font-family: "Noto Sans JP", sans-serif;
      }

      .center-card {
        color: #fff;
      }

      .center-card > * {
        margin-top: 40px;
      }

      .center-card p {
        width: 90%;
        max-width: 62em;
        text-align: center;
      }

      .center-card .more {
        color: #79d5ff;
      }

      /* Single post */

      #post-section {
        background-color: #efefef;
        min-height: 70vh;
      }

      .post {
        width: 100%;
      }

      .post-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 70px auto;
        width: 90%;
        max-width: 62em;
      }

      .post-wrapper li {
        font-weight: 300;
        margin-left: 2em;
        line-height: 1.4em;
      }

      .post-wrapper ul li {
        list-style: disc;
      }

      .post-wrapper ol li {
        list-style: decimal;
      }

      .post h1:nth-child(1),
      .post h2:nth-child(1),
      .post h3:nth-child(1),
      blockquote p:nth-child(1) {
        margin-top: 0px;
      }

      .post h1,
      .post h2 {
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid #999999;
        margin-top: 30px;
      }

      .post h1 {
        margin-top: 45px;
      }

      .post h2 {
        margin-bottom: 15px;
      }

      .post p,
      .code-box,
      .post ul,
      blockquote {
        margin-bottom: 15px;
        margin-top: 15px;
        letter-spacing: 0.02em;
      }

      .post ul li {
        margin-bottom: 10px;
        margin-top: 10px;
      }

      .post a {
        color: #e20052;
        text-decoration: underline;
      }

      .center {
        display: block;
        margin-left: auto;
        margin-right: auto;
      }

      .post figure figcaption p {
        margin: 0;
        text-align: center;
        font-weight: 300;
        font-size: 80%;
      }

      .post figure {
        margin-top: 20px;
        margin-bottom: 20px;
      }

      .post aside {
        border: solid 1px;
        background-color: #e2e2e2;
        padding: 15px;
        margin: 20px;
        font-size: 90%;
      }
      .post aside p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <section id="post-section">
      <div class="post-wrapper">
        <div class="post">
          <p>
            After almost three years of 6.x series kernels, Linux 7.0 is finally
            here. That means it’s also time for another Asahi progress report!
          </p>
          <div class="footnotes" role="doc-endnotes">
            <hr />
            <ol>
              <li id="fn:1">
                <p>
                  We cannot stress enough just how misleading this name is; the
                  Processor is <em>not</em> Always-On&nbsp;<a
                    href="https://asahilinux.org/2026/04/progress-report-7-0/#fnref:1"
                    class="footnote-backref"
                    role="doc-backlink"
                    >↩︎</a
                  >
                </p>
              </li>
            </ol>
          </div>
          <div class="post-bottom">
            James Calligeros · <span class="publishdate">2026-04-26</span>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
