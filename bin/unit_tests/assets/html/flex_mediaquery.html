<!doctype html>
<html lang="en">
  <head>
    <style>
      :root {
        --bg: #1c1917;
        --text: #f0eeec;
        --heading: #fafaf7;
        --muted: #a8a29e;
      }

      body {
        background-color: var(--bg);
        background-position-x: 0%;
        background-position-y: 0%;
        background-size: auto;
        background-origin: padding-box;
        background-clip: border-box;
        color: var(--text);
      }

      .site-header {
        padding-top: 2rem;
        padding-right: 1.5rem;
        padding-bottom: 1.5rem;
        padding-left: 1.5rem;
        max-width: 700px;
        margin-top: 0;
        margin-right: auto;
        margin-bottom: 0;
        margin-left: auto;
        display: flex;
        align-items: center;
      }

      .header-logo {
        display: flex;
        gap: 0.6rem;
        text-decoration: none;
      }

      .site-nav {
        display: flex;
        gap: 1.5rem;
      }

      .site-nav a {
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--muted);
        text-decoration: none;
        transition: color 0.2s;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav">
        <a href="https://causality.blog/series">Series</a>
        <a href="https://causality.blog/about">About</a>
        <a
          href="https://buttondown.com/causality"
          target="_blank"
          rel="noopener"
          >Subscribe</a
        >
        <a href="https://causality.blog/rss.xml">RSS</a>
      </nav>
    </header>
  </body>
</html>
